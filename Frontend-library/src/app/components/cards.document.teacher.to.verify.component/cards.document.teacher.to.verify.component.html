        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        @for (item of cardItemsToVerify; track item) {

          <div class="group cursor-pointer">
              <div class="relative  bg-gray-100 rounded-xl border border-gray-200 overflow-hidden mb-3 group-hover:shadow-md transition">
                <div class="p-4 text-[6px] text-gray-400 leading-tight">
                  <p class="font-bold text-[8px] text-black mb-2 uppercase">{{ item.title }}</p>
                  <p class="line-clamp-3">{{ item.description }}</p>
                </div>
                <span class="absolute bottom-2 right-2 bg-white/90 px-1.5 py-0.5 rounded text-[10px] font-bold shadow-sm">{{ item.amount }} MB</span>
              </div>
              <h3 class="text-sm font-bold text-blue-600 leading-snug group-hover:underline">{{ item.title }}</h3>
              <p class="text-[11px] text-gray-400 mt-1"> {{ item.subject }} | {{ item.career }}</p>
              <div class="flex flex-row gap-2">
                <button class="mt-3 flex items-center gap-2 px-4 py-1.5 border border-gray-200 rounded-full text-[11px] font-bold hover:bg-gray-50 transition text-red-600">
                  🔖 Cancelar
                </button>
                <button class="mt-3 flex items-center gap-2 px-4 py-1.5 border border-gray-200 rounded-full text-[11px] font-bold hover:bg-gray-50 transition">
                  🔖 Editar
                </button>
              </div>
          </div>

        }


        </div>
