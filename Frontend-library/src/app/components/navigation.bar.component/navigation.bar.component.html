<div class="flex h-screen w-full bg-[#f8fafc] overflow-hidden relative font-sans text-slate-700">

  <aside 
    [class]="isSidebarOpen 
      ? 'w-72 translate-x-0' 
      : 'w-0 -translate-x-full lg:w-0 lg:-ml-64'"
    class="bg-[#1e293b] text-slate-300 transition-all duration-300 ease-in-out fixed inset-y-0 left-0 z-50 lg:relative shadow-lg overflow-hidden flex flex-col h-full">
    
    <div class="p-6">
      <div class="flex w-full justify-between items-center">
        <h1 class="text-lg font-semibold tracking-wide text-white uppercase">
          Library
        </h1>
        <button (click)="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white text-2xl">&times;</button>
      </div>
    </div>

    <div class="px-6 py-6 border-y border-slate-700/50 bg-[#1a2232]">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-slate-600 rounded flex items-center justify-center text-white font-bold">
          L
        </div>
        <div class="overflow-hidden">
          <p class="text-sm font-medium text-slate-100 truncate">Leonardo Rodriguez</p>
          <p class="text-[10px] uppercase tracking-widest text-slate-400">Admin</p>
        </div>
      </div>
      
      <div class="flex justify-between mt-5 text-center border-t border-slate-700/30 pt-4">
        <div><p class="text-xs font-bold text-slate-200">0</p><p class="text-[9px] text-slate-500 uppercase tracking-tighter">Documentos</p></div>
        <div><p class="text-xs font-bold text-slate-200">0</p><p class="text-[9px] text-slate-500 uppercase tracking-tighter">Asignaturas</p></div>
        <div><p class="text-xs font-bold text-slate-200">0</p><p class="text-[9px] text-slate-500 uppercase tracking-tighter">Tesis</p></div>
      </div>

      <button class="w-full mt-5 bg-slate-100 text-slate-900 py-2 rounded text-xs font-bold hover:bg-white transition-colors uppercase tracking-widest">
        + Nuevo Registro
      </button>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a routerLink="/Home" routerLinkActive="bg-slate-700 text-white" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">🏠</span> Inicio
      </a>
      <a routerLink="/myLibrary" routerLinkActive="bg-slate-700 text-white" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">📚</span> MI LIBRERÍA
      </a>
      <a routerLink="/library" routerLinkActive="bg-slate-700 text-white" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">📝</span> LIBRERÍA
      </a>
      <a routerLink="/DocumentManagement" routerLinkActive="bg-slate-700 text-white" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">📝</span> GESTIÓN DE LIBRERÍA
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">📖</span> VERIFICACIÓN
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">⏰</span>  GESTION DE INVENTARIO
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">👨‍🏫</span> GESTION DEL PERSONAL
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">📖</span> CARRERAS Y ASIGNATURAS
      </a>
    </nav>

    <div class="px-3 py-4 border-t border-slate-700/50 bg-[#1a2232]">
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded hover:bg-slate-700 hover:text-white transition-colors">
        <span class="grayscale opacity-70">👤</span> PERFIL
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded text-slate-400 hover:bg-red-900/20 hover:text-red-400 transition-colors mt-1">
        <span class="grayscale opacity-70">🚪</span> CERRAR SESIÓN
      </a>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 transition-all duration-300 ease-in-out">
    <div class="fixed top-5 right-5 z-50">
      <button 
      (click)="toggleSidebar()" 
      class="p-2 bg-white border border-slate-200 text-slate-500 hover:text-slate-800 transition-all shadow-sm rounded">
        <span class="text-lg px-1">☰</span>
      </button>
    </div>

    @if (isSidebarOpen) {
      <div 
        (click)="toggleSidebar()" 
        class="fixed inset-0 bg-slate-900/20 z-40 lg:hidden transition-opacity">
      </div>
    }
  </main>

</div>
