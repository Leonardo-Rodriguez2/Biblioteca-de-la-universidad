<aside 
  [class]="isSidebarOpen 
    ? 'w-64 translate-x-0' 
    : 'w-0 -translate-x-full lg:w-0 lg:-ml-64'"
  class="bg-[#1e293b] text-slate-400 transition-all duration-300 ease-in-out fixed inset-y-0 left-0 z-50 lg:relative flex flex-col h-full shadow-2xl border-r border-slate-700/40">
  
  <div class="p-6 flex items-center gap-3">
    <div class="w-8 h-8 bg-slate-700 rounded flex items-center justify-center border border-slate-600">
      <span class="text-slate-200 font-bold text-sm">L</span>
    </div>
    <h1 class="text-sm font-semibold tracking-widest text-slate-100 uppercase">Library</h1>
  </div>

  <div class="mx-4 mb-4 px-4 py-3 bg-slate-800/30 border border-slate-700/50 rounded-lg">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-slate-700 rounded-full  flex items-center justify-center border border-slate-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <div class="overflow-hidden">
        <p class="text-[12.5px] font-medium text-slate-200 truncate">{{ user.name }}</p>
        <p class="text-[9px] text-slate-500 uppercase tracking-tight font-semibold">Administrador Principal</p>
      </div>
    </div>
  </div>

<nav class="flex-1 px-3 space-y-1 overflow-y-auto scrollbar-thin scrollbar-thumb-slate-700">

  <!-- Inicio -->
  <a routerLink="/dashboard/home" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
     class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
    <!-- Home Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3m-6 0h6" />
    </svg>
    Inicio
  </a>

    <a routerLink="/dashboard/myLibrary" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
      Mi Librería
    </a>

    <a routerLink="/dashboard/library" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      Explorar Catálogo
    </a>

    <a routerLink="/dashboard/library" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      Verificacion de Documentos
    </a>

    <a routerLink="/dashboard/library" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      Notificaciones
    </a>

    <a routerLink="/dashboard/userManagement" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      Control de Personal
    </a>

    <a routerLink="/dashboard/subjectManagement" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Control de Asignaturas
    </a>

    <a routerLink="/dashboard/pnfManagement" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      Control de PNF
    </a>

    <a routerLink="/dashboard/categoryManagement" routerLinkActive="bg-slate-700/50 text-white ring-1 ring-slate-600/50" 
       class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      Control de Categorias
    </a>

    <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded-md hover:bg-slate-800 hover:text-slate-100 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Control de auditorias
    </a>

  </nav>

  <div class="p-4 border-t border-slate-700/40">
    <button (click)="ClosetSession()" 
       class="w-full flex items-center gap-3 px-3 py-2 text-[13px] rounded-md text-slate-400 hover:bg-slate-800 hover:text-red-400 transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40 group-hover:opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Salir del Sistema
    </button>
  </div>
</aside>

@if (isSidebarOpen) {
  <div 
    (click)="onOverlayClick()" 
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 lg:hidden cursor-pointer">
  </div>
}
