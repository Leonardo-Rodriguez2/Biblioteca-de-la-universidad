<aside 
  [class]="isSidebarOpen 
    ? 'w-64 translate-x-0' 
    : 'w-0 -translate-x-full lg:w-0 lg:-ml-60'"
  class="bg-[#1e293b] text-slate-300 transition-all duration-300 ease-in-out fixed inset-y-0 left-0 z-50 lg:relative flex flex-col h-full shadow-2xl">
  
  <div class="p-5 flex items-center gap-3">
    <h1 class="text-sm font-bold tracking-widest text-white uppercase">Library</h1>
  </div>

  <div class="px-5 py-4 bg-slate-800/40 border-y border-slate-700/50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-slate-600 rounded-full border border-slate-500 overflow-hidden flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <div class="overflow-hidden">
        <p class="text-[12px] font-medium text-slate-100 truncate">Leonardo Rodriguez</p>
        <p class="text-[9px] text-slate-400 uppercase tracking-tighter">Administrador Principal</p>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto scrollbar-thin scrollbar-thumb-slate-700">
    
    <a routerLink="/dashboard/home" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Inicio
    </a>

    <a routerLink="/dashboard/myLibrary" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
      Mi Librería
    </a>

    <a routerLink="/dashboard/library" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      Explorar Catálogo
    </a>

    <a  routerLink="/dashboard/userManagement" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      Control de Personal
    </a>

    <a href="dashboard/subjectManagement" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Control de asignaturas (Materias)
    </a>

    <a routerLink="/dashboard/pnfManagement" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      Control de PNF (Carreras)
    </a>


    <a routerLink="/dashboard/warehouseManagement" routerLinkActive="bg-red-800 text-white" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
      </svg>
      Control de Almacenes
    </a>

    <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      Reportes Mensuales
    </a>

    <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
      Seguridad y Logs
    </a>

    <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] rounded hover:bg-slate-800 hover:text-white transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Configuración
    </a>

  </nav>

  <div (click)="ClosetSession()" class="p-3 border-t border-slate-700/50 cursor-pointer">
    <a class="flex items-center gap-3 px-3 py-2 text-[13px] rounded text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Salir del Sistema
    </a>
  </div>
</aside>

@if (isSidebarOpen) {
  <div 
    (click)="onOverlayClick()" 
    class="fixed inset-0 bg-slate-900/20 backdrop-blur-[1px] z-40 lg:hidden cursor-pointer">
  </div>
}
